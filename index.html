<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyanogenMod 10 (Android 4.x) Emulator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Roboto, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }

        /* Retro Android 4.x Era Phone Frame (Thicker bezels, classic touch keys) */
        .phone-frame {
            width: 360px;
            height: 680px;
            background: #1a1a1a;
            border: 4px solid #333;
            border-radius: 28px;
            position: relative;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Retro Speaker Ear Piece */
        .ear-piece {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: #444;
            border-radius: 2px;
            z-index: 100;
        }

        /* Android 4.x Holo-style Status Bar */
        .status-bar {
            height: 26px;
            padding: 4px 12px 0 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            font-weight: normal;
            color: #33b5e5; /* Classic Holo Blue */
            z-index: 90;
            position: absolute;
            top: 30px;
            width: 100%;
            pointer-events: none;
            opacity: 0;
            background: #000000;
        }

        .status-bar.visible {
            opacity: 1;
        }

        /* Screen Canvas Container matching old aspect ratios */
        .screen {
            margin-top: 30px;
            margin-bottom: 50px;
            flex: 1;
            position: relative;
            background: #000;
            overflow: hidden;
        }

        /* CyanogenMod Cid Boot Screen */
        .boot-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 300;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 1;
            transition: opacity 0.8s ease;
        }

        .boot-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .boot-logo-cid {
            width: 70px;
            height: 70px;
            border: 4px solid #33b5e5;
            border-radius: 20px;
            position: relative;
            animation: pulseCid 1.5s ease-in-out infinite alternate;
            margin-bottom: 20px;
        }

        .boot-logo-cid::before, .boot-logo-cid::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            background: #33b5e5;
            border-radius: 50%;
            top: 25px;
        }
        .boot-logo-cid::before { left: 15px; }
        .boot-logo-cid::after { right: 15px; }

        @keyframes pulseCid {
            0% { transform: scale(0.9); opacity: 0.6; box-shadow: 0 0 10px rgba(51, 181, 229, 0.3); }
            100% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 25px rgba(51, 181, 229, 0.8); }
        }

        .boot-title {
            font-size: 14px;
            font-weight: bold;
            color: #33b5e5;
            letter-spacing: 3px;
        }

        /* Classic Holo Teal Phase Wallpaper */
        .wallpaper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 20%, #102e3c 0%, #050d14 100%);
            z-index: 1;
            opacity: 0;
        }

        .wallpaper::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 80%, rgba(51, 181, 229, 0.25) 0%, transparent 60%);
        }

        .wallpaper.visible {
            opacity: 1;
        }

        /* Launcher Grid */
        .home-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 30px 16px 20px 16px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: max-content;
            gap: 20px;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
        }

        .home-screen.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .app-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        /* Square Icon Framework */
        .icon-shape {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #2d3238, #15171a);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .icon-shape.settings svg {
            width: 26px;
            height: 26px;
            fill: #33b5e5; 
        }

        .app-label {
            margin-top: 6px;
            font-size: 11px;
            text-align: center;
            color: #fff;
            text-shadow: 0 1px 2px #000;
        }

        /* Android 4.x Holo Zoom-In Animation Config */
        .settings-app {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            color: #ffffff;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            
            /* ICS/JB Style Center Window Scale Trigger */
            transform: scale(0.6);
            transition: transform 0.5s cubic-bezier(0.1, 0.9, 0.2, 1), 
                        opacity 0.4s ease-out;
            
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .settings-app.open {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }

        /* Holo Header Divider */
        .settings-header {
            padding: 12px 16px 6px 16px;
            border-bottom: 2px solid #33b5e5;
            margin-bottom: 4px;
        }

        .settings-header h1 {
            font-size: 18px;
            font-weight: 300;
            color: #33b5e5;
            text-transform: uppercase;
        }

        .settings-content {
            flex: 1;
            overflow-y: auto;
        }

        .settings-category {
            padding: 10px 16px 4px 16px;
            font-size: 11px;
            font-weight: bold;
            color: #33b5e5;
            text-transform: uppercase;
        }

        .settings-item {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #141414;
        }

        .settings-item:active {
            background: rgba(51, 181, 229, 0.2);
        }

        .settings-title {
            font-size: 14px;
        }

        .settings-subtitle {
            font-size: 11px;
            color: #888;
            margin-top: 1px;
        }

        /* Retro Capacitive Touch Keys Hardware Strip */
        .hardware-buttons {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: #111;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            border-top: 1px solid #222;
            padding: 0 20px;
        }

        .hw-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 50px;
            height: 100%;
            cursor: pointer;
        }

        .hw-btn svg {
            width: 20px;
            height: 20px;
            fill: #555;
            transition: fill 0.1s;
        }

        .hw-btn:active svg {
            fill: #33b5e5; /* Lights up blue on touch */
        }
    </style>
</head>
<body>

    <div class="phone-frame">
        <div class="ear-piece"></div>

        <div class="status-bar" id="statusBar">
            <span id="clock">12:00 PM</span>
            <div style="display: flex; gap: 6px; align-items: center;">
                <span>3G</span>
                <span>100%</span>
            </div>
        </div>

        <div class="screen">
            <div id="wallpaper" class="wallpaper"></div>

            <div id="bootScreen" class="boot-screen">
                <div class="boot-logo-cid"></div>
                <div class="boot-title">CyanogenMod</div>
            </div>
            
            <div class="home-screen" id="homeScreen">
                <div class="app-icon" onclick="openSettings()">
                    <div class="icon-shape settings">
                        <svg viewBox="0 0 24 24">
                            <path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3-1.57-3-3.5s1.07-3.5 3-3.5 3 1.57 3 3.5-1.07 3.5-3 3.5z"/>
                        </svg>
                    </div>
                    <div class="app-label">Settings</div>
                </div>
            </div>

            <div id="settingsApp" class="settings-app">
                <div class="settings-header">
                    <h1>Settings</h1>
                </div>
                
                <div class="settings-content">
                    <div class="settings-category">Wireless & Networks</div>
                    <div class="settings-item">
                        <div class="settings-title">Wi-Fi</div>
                    </div>
                    <div class="settings-item">
                        <div class="settings-title">Bluetooth</div>
                    </div>

                    <div class="settings-category">Device</div>
                    <div class="settings-item">
                        <div class="settings-title">Display</div>
                    </div>
                    <div class="settings-item">
                        <div class="settings-title">Storage</div>
                    </div>

                    <div class="settings-category">System</div>
                    <div class="settings-item">
                        <div>
                            <div class="settings-title">About Phone</div>
                            <div class="settings-subtitle">Android 4.1.2 (CyanogenMod 10)</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="hardware-buttons">
            <div class="hw-btn" onclick="closeSettings()">
                <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </div>
            <div class="hw-btn" onclick="closeSettings()">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            </div>
            <div class="hw-btn">
                <svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/></svg>
            </div>
        </div>
    </div>

    <script>
        const bootScreen = document.getElementById('bootScreen');
        const wallpaper = document.getElementById('wallpaper');
        const homeScreen = document.getElementById('homeScreen');
        const statusBar = document.getElementById('statusBar');
        const settingsApp = document.getElementById('settingsApp');

        // Loader Loop Trigger
        window.addEventListener('load', () => {
            setTimeout(() => {
                bootScreen.classList.add('fade-out');
                setTimeout(() => {
                    wallpaper.classList.add('visible');
                    homeScreen.classList.add('visible');
                    statusBar.classList.add('visible');
                }, 300);
            }, 2500);
        });

        // Genuine Android 4.x Scale Fade Animation Engine Execution Links
        function openSettings() {
            settingsApp.classList.add('open');
        }

        function closeSettings() {
            settingsApp.classList.remove('open');
        }

        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0' + minutes : minutes;
            document.getElementById('clock').textContent = `${hours}:${minutes} ${ampm}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
