<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Modern LineageOS 17.1 (Android 10) Simulator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Google Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent; 
            touch-action: none; 
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background: #0c0f12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #e2e2e2;
        }

        /* GALAXY S3 NEO - PEBBLE BLUE HARDWARE CHASSIS */
        .s3-neo-frame {
            width: 360px;
            height: 680px;
            background: linear-gradient(135deg, #162432 0%, #090e15 100%);
            border-radius: 55px;
            position: relative;
            box-shadow: 
                inset 0 0 8px rgba(255, 255, 255, 0.1),
                inset 0 0 4px rgba(0,0,0,0.6),
                0 0 0 3px #485664, 
                0 20px 50px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            padding: 55px 22px 65px 22px; 
        }

        /* Top Bezel Hardware */
        .top-bezel-assembly {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 55px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .ear-speaker {
            width: 55px;
            height: 6px;
            background: #485664;
            border-radius: 3px;
            border: 1px solid #333f4a;
            box-shadow: inset 0 1px 1px rgba(0,0,0,0.3);
        }
        .sensor-group {
            position: absolute;
            left: 65px;
            display: flex;
            gap: 6px;
        }
        .sensor-dot {
            width: 6px;
            height: 6px;
            background: #05080c;
            border-radius: 50%;
            opacity: 0.9;
        }
        .camera-lens {
            position: absolute;
            right: 65px;
            width: 10px;
            height: 10px;
            background: #0a1118;
            border: 1px solid #333f4a;
            border-radius: 50%;
        }

        /* Active Screen Glass */
        .display-screen {
            flex: 1;
            background: #000;
            position: relative;
            overflow: hidden;
            border: 2px solid #070d14; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.9);
        }

        /* Android 10 Clean Status Bar */
        .status-bar {
            height: 28px;
            padding: 0 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            font-weight: 500;
            color: #ffffff;
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 90;
            background: transparent;
            opacity: 0;
        }
        .status-bar.visible { opacity: 1; }

        .status-bar-icons {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-bar-icons svg {
            width: 13px;
            height: 13px;
            fill: #ffffff;
        }

        /* WALLPAPER WITH DEEP ACCENTED ZOOM */
        .wallpaper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 100% 100%, #153c3e 0%, #0a1015 60%);
            z-index: 1;
            opacity: 0;
            transform: scale(1);
            transition: transform 0.85s cubic-bezier(0.15, 1, 0.3, 1);
        }
        .wallpaper.visible { opacity: 1; }

        /* Modern LineageOS Boot Engine */
        .boot-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 300;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 1;
            transition: opacity 0.5s cubic-bezier(0.15, 1, 0.3, 1);
        }
        .boot-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .boot-logo-wrapper {
            position: relative;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .boot-arc {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid #00acc1;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1.8s linear infinite;
        }
        .boot-center-dot {
            width: 10px;
            height: 10px;
            background-color: #00acc1;
            border-radius: 50%;
            animation: pulse 1.2s ease-in-out infinite alternate;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        /* Trebuchet Launcher Desk Layer */
        .home-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 45px 20px 20px 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: max-content;
            gap: 24px;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: transform 0.85s cubic-bezier(0.15, 1, 0.3, 1), opacity 0.6s ease;
        }
        .home-screen.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .home-screen.app-active {
            transform: scale(0.9);
            opacity: 0;
        }

        .app-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }
        .icon-shape {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: transform 0.2s cubic-bezier(0.15, 1, 0.3, 1);
        }
        .app-icon:active .icon-shape {
            transform: scale(0.88);
        }
        .icon-shape.settings {
            background: linear-gradient(135deg, #4f5b66 0%, #343d46 100%);
        }
        .icon-shape.settings svg {
            width: 26px;
            height: 26px;
            fill: #ffffff;
        }
        .app-label {
            margin-top: 8px;
            font-size: 11px;
            font-weight: 500;
            text-align: center;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.4);
            letter-spacing: 0.2px;
        }

        /* BASE APP LAYER STYLE - STATES MANAGED VIA JS INLINE TRANSLATIONS */
        .settings-app {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #12151c;
            color: #e8eaed;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Settings Header */
        .settings-header {
            padding: 42px 24px 20px 24px;
            background: #171b24;
            border-bottom: 1px solid #222834;
        }
        .settings-header h1 {
            font-size: 26px;
            font-weight: 400;
            color: #fff;
            letter-spacing: -0.5px;
        }
        
        /* Scroll entirely disabled */
        .settings-scroll-box {
            flex: 1;
            overflow: hidden; 
            padding-bottom: 20px;
        }
        
        .settings-category {
            padding: 22px 24px 8px 24px;
            font-size: 11px;
            font-weight: 700;
            color: #00acc1;
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }
        
        .settings-item {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
            background: transparent;
            border-bottom: 1px solid #1a202c;
        }
        
        .settings-item-icon-wrap {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #1f2635;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 18px;
        }
        .settings-item-icon {
            width: 18px;
            height: 18px;
            fill: #00acc1;
        }

        /* Pressed ink overlay */
        .settings-item::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.05);
            opacity: 0;
            transition: opacity 0.15s linear;
        }
        .settings-item:active::after {
            opacity: 1;
        }

        .settings-title { 
            font-size: 15px; 
            font-weight: 500;
            color: #fff;
        }
        .settings-subtitle { 
            font-size: 12px; 
            color: #8fa0b0; 
            margin-top: 3px; 
        }

        /* BOTTOM HARDWARE ROW */
        .bottom-bezel-assembly {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 65px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 30px;
            z-index: 200;
        }

        .capacitive-btn {
            width: 60px;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .capacitive-btn svg {
            width: 20px;
            height: 20px;
            fill: #00acc1; 
            opacity: 0.12;
            transition: opacity 0.1s;
        }
        .capacitive-btn:active svg {
            opacity: 0.85;
        }

        .physical-home-button {
            width: 95px;
            height: 28px;
            background: linear-gradient(to bottom, #162738, #0e1a26);
            border: 2px solid #2e3e4f;
            border-radius: 14px;
            box-shadow: 
                0 1px 2px rgba(0,0,0,0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            cursor: pointer;
            margin: 0 auto;
            transition: transform 0.05s;
        }
        .physical-home-button:active {
            transform: scale(0.96);
            background: #0b141d;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <div class="s3-neo-frame">
        <div class="top-bezel-assembly">
            <div class="sensor-group">
                <div class="sensor-dot"></div>
                <div class="sensor-dot"></div>
            </div>
            <div class="ear-speaker"></div>
            <div class="camera-lens"></div>
        </div>

        <div class="display-screen">
            
            <div id="bootScreen" class="boot-screen">
                <div class="boot-logo-wrapper">
                    <div class="boot-arc"></div>
                    <div class="boot-center-dot"></div>
                </div>
            </div>

            <div class="status-bar" id="statusBar">
                <span id="clock">12:00</span>
                <div class="status-bar-icons">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                    <span>LTE</span>
                    <span>100%</span>
                </div>
            </div>

            <div id="wallpaper" class="wallpaper"></div>

            <div class="home-screen" id="homeScreen">
                <div class="app-icon" id="settingsLauncher" onclick="openSettings()">
                    <div class="icon-shape settings">
                        <svg viewBox="0 0 24 24"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3-1.57-3-3.5s1.07-3.5 3-3.5 3 1.57 3 3.5-1.07 3.5-3 3.5z"/></svg>
                    </div>
                    <div class="app-label">Settings</div>
                </div>
            </div>

            <div id="settingsApp" class="settings-app">
                <div class="settings-header">
                    <h1>Settings</h1>
                </div>
                
                <div class="settings-scroll-box">
                    <div class="settings-category">Network & internet</div>
                    <div class="settings-item">
                        <div class="settings-item-icon-wrap">
                            <svg class="settings-item-icon" viewBox="0 0 24 24"><path d="M12.01 21.49L23.64 7c-.45-.34-4.93-4-11.64-4C5.28 3 .81 6.66.36 7l11.63 14.49.01.01.01-.01z"/></svg>
                        </div>
                        <div>
                            <div class="settings-title">Wi-Fi</div>
                            <div class="settings-subtitle">Connected to network</div>
                        </div>
                    </div>
                    <div class="settings-item">
                        <div class="settings-item-icon-wrap">
                            <svg class="settings-item-icon" viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
                        </div>
                        <div>
                            <div class="settings-title">Mobile network</div>
                            <div class="settings-subtitle">Lineage LTE active</div>
                        </div>
                    </div>
                    
                    <div class="settings-category">Device Personalization</div>
                    <div class="settings-item">
                        <div class="settings-item-icon-wrap">
                            <svg class="settings-item-icon" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9zm0 15c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z"/></svg>
                        </div>
                        <div>
                            <div class="settings-title">Display & Wallpaper</div>
                            <div class="settings-subtitle">System scale and animation speed values</div>
                        </div>
                    </div>
                    
                    <div class="settings-category">System</div>
                    <div class="settings-item">
                        <div class="settings-item-icon-wrap">
                            <svg class="settings-item-icon" viewBox="0 0 24 24"><path d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9C6.48 2 2 6.48 2 12s4.48 10 2 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
                        </div>
                        <div>
                            <div class="settings-title">About phone</div>
                            <div class="settings-subtitle">Galaxy S3 Neo • Android 10 • LineageOS 17.1</div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <div class="bottom-bezel-assembly">
            <div class="capacitive-btn">
                <svg viewBox="0 0 24 24"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
            </div>
            
            <div class="physical-home-button" onclick="closeSettings()"></div>
            
            <div class="capacitive-btn" onclick="closeSettings()">
                <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </div>
        </div>

    </div>

    <script>
        const bootScreen = document.getElementById('bootScreen');
        const wallpaper = document.getElementById('wallpaper');
        const homeScreen = document.getElementById('homeScreen');
        const statusBar = document.getElementById('statusBar');
        const settingsApp = document.getElementById('settingsApp');
        const launcherIcon = document.getElementById('settingsLauncher');

        // State Engine: 'closed', 'opening', 'open', 'closing'
        let appState = 'closed';
        let stateTimeout = null;

        window.addEventListener('load', () => {
            resetToIconOrigin();
            setTimeout(() => {
                bootScreen.classList.add('fade-out');
                setTimeout(() => {
                    wallpaper.classList.add('visible');
                    homeScreen.classList.add('visible');
                    statusBar.classList.add('visible');
                }, 150);
            }, 2500);
        });

        function resetToIconOrigin() {
            const rect = launcherIcon.getBoundingClientRect();
            const parentRect = homeScreen.getBoundingClientRect();
            const xOffset = (rect.left + rect.width / 2) - parentRect.left;
            const yOffset = (rect.top + rect.height / 2) - parentRect.top;
            
            // Hard zero-out on styles to prevent animation bleeding
            settingsApp.style.transition = 'none';
            settingsApp.style.transformOrigin = `${xOffset}px ${yOffset}px`;
            settingsApp.style.transform = 'scale(0.15) translateY(0)';
            settingsApp.style.borderRadius = '50%';
            settingsApp.style.opacity = '0';
            settingsApp.style.pointerEvents = 'none';
        }

        function openSettings() { 
            // If already open or currently in the middle of opening, block redundant taps
            if (appState === 'open' || appState === 'opening') return;

            // CRITICAL: Immediately clear out active closing timer transitions to stop the jump glitch
            if (stateTimeout) {
                clearTimeout(stateTimeout);
                stateTimeout = null;
            }

            // Instantly snap settings app back to starting coordinates before running the open cycle
            resetToIconOrigin();
            
            // Force browser engine repaint matrix to register the hard visual reset
            settingsApp.offsetHeight;
            
            appState = 'opening';

            // Configure the slow material transition values
            settingsApp.style.transition = 'transform 0.85s cubic-bezier(0.15, 1, 0.3, 1), opacity 0.4s linear, border-radius 0.75s cubic-bezier(0.15, 1, 0.3, 1)';
            
            // Trigger zoom states
            settingsApp.style.opacity = '1';
            settingsApp.style.pointerEvents = 'auto';
            settingsApp.style.transform = 'scale(1) translateY(0)';
            settingsApp.style.borderRadius = '0px';
            
            homeScreen.classList.add('app-active');
            wallpaper.style.transform = 'scale(1.35)';

            // Mark open sequence complete
            stateTimeout = setTimeout(() => {
                appState = 'open';
                stateTimeout = null;
            }, 850);
        }
        
        function closeSettings() { 
            if (appState === 'closed' || appState === 'closing') return;

            // Kill active opening timers
            if (stateTimeout) {
                clearTimeout(stateTimeout);
                stateTimeout = null;
            }

            appState = 'closing';
            
            // Set transitions specifically for slide-down path execution
            settingsApp.style.transition = 'transform 0.75s cubic-bezier(0.15, 1, 0.3, 1), opacity 0.3s ease-in';
            
            // Execute the downward translation slide
            settingsApp.style.opacity = '0';
            settingsApp.style.pointerEvents = 'none';
            settingsApp.style.transform = 'translateY(100%) scale(1)';
            settingsApp.style.borderRadius = '0px';
            
            homeScreen.classList.remove('app-active');
            wallpaper.style.transform = 'scale(1)';

            // Lock and reset layout back to starting launcher position once animation is out of screen sight
            stateTimeout = setTimeout(() => {
                resetToIconOrigin();
                appState = 'closed';
                stateTimeout = null;
            }, 750);
        }

        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            minutes = minutes < 10 ? '0' + minutes : minutes;
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // BLOCK ALL PORTAL WEB VIEWPORT GESTURE OVERRIDES
        document.addEventListener('gesturestart', function(e) {
            e.preventDefault();
        });
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
